<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guess the Scientist - Hangman</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay"></div>

<h1>🔬 Guess the Scientist 🔬</h1>

<div class="game">

<h3>Clue:</h3>
<p id="clue"></p>

<pre id="hangman"></pre>

<div id="word"></div>

<input type="text" id="letter" maxlength="1" placeholder="A">
<button id="guessBtn">Guess</button>

<p id="message"></p>

<button id="newGame">New Game</button>

</div>

<script src="script.js"></script>

</body>
</html>
